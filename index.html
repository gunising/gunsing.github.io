<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KM Pragati Singh Resume</title>

  <!-- Disable caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }

    header {
      background-color: #343a40;
      color: white;
      padding: 1rem;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    .pdf-container {
      width: 100%;
      height: calc(100vh - 110px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .download-link {
      display: none;
    }

    footer {
      background: #f1f1f1;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #666;
    }

    /* Mobile: iframes often can't render PDFs, so show a download link instead */
    @media (max-width: 768px) {
      .pdf-container {
        height: auto;
      }

      iframe {
        display: none;
      }

      .download-link {
        display: block;
        text-align: center;
        padding: 3rem 1rem;
      }

      .download-link a {
        display: inline-block;
        background-color: #343a40;
        color: white;
        text-decoration: none;
        padding: 0.9rem 1.8rem;
        border-radius: 6px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>KM Pragati Singh - Resume</h1>
  </header>

  <div class="pdf-container">
    <iframe src="Resume.pdf" allowfullscreen></iframe>
    <div class="download-link">      
      <iframe src="https://docs.google.com/gview?url=https://gunising.github.io/gunsing.github.io/Resume.pdf&embedded=true" allowfullscreen></iframe>
    </div>
  </div>

  <footer>
    &copy; 2026 KM Pragati Singh
  </footer>

</body>
</html>
